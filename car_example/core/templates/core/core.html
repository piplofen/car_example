{% load static tailwind_tags %}
{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    {% tailwind_preload_css %}
    {% tailwind_css %}
    <style>
        html {
            background-color: #ebf1f3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overflow-y: scroll;
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="max-w-full flex flex-col min-h-screen">
    <div class="relative overflow-x-auto bg-transparent shadow-lg rounded-xl border border-1">
        <table class="w-[50%] mx-auto text-lg text-center rtl:text-right text-body">
            <thead class="text-lg text-body bg-green-300 border-b border-2">
                <tr>
                    <th scope="col" class="hidden px-6 py-3 font-medium">
                        ID
                    </th>
                    <th scope="col" class="px-6 py-3 font-medium">
                        Название
                    </th>
                    <th scope="col" class="px-6 py-3 font-medium">
                        Страна
                    </th>
                    <th scope="col" class="px-6 py-3 font-medium">
                        Год
                    </th>
<!--                    <th scope="col" class="px-6 py-3 font-medium">-->
<!--                        <span class="sr-only">Edit</span>-->
<!--                    </th>-->
                </tr>
            </thead>
            <tbody>
                {% for d in data %}
                    <tr class="bg-red-300 border-b border-1 hover:bg-red-400">
                            <td class="hidden px-6 py-4">
                                {{ d.id }}
                            </td>
                            <td class="px-6 py-4">
                                {{ d.name }}
                            </td>
                            <td class="px-6 py-4">
                                {{ d.country }}
                            </td>
                            <td class="px-6 py-4">
                                {{ d.year_from }} - {{ d.year_to }}
                            </td>
        <!--                    <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">-->
        <!--                        Apple MacBook Pro 17"-->
        <!--                    </th>-->
        <!--                    <td class="px-6 py-4">-->
        <!--                        Silver-->
        <!--                    </td>-->
        <!--                    <td class="px-6 py-4">-->
        <!--                        Laptop-->
        <!--                    </td>-->
        <!--                    <td class="px-6 py-4">-->
        <!--                        $2999-->
        <!--                    </td>-->
        <!--                    <td class="px-6 py-4 text-right">-->
        <!--                        <a href="#" class="font-medium text-fg-brand hover:underline">Edit</a>-->
        <!--                    </td>-->
                        </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>


</html>
